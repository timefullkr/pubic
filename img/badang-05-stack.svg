<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 350" role="img" aria-label="AI 교육 서비스 3층 구조: 기반 계층 LMS는 구축 완료, AI 추론 계층과 안전·데이터 거버넌스 계층은 부재" font-family="Pretendard,'Malgun Gothic',sans-serif">
